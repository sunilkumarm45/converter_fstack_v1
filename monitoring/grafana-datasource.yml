apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: converter
      defaultBucket: metrics
      tlsSkipVerify: true
    secureJsonData:
      token: default-token
    isDefault: true
    editable: true

